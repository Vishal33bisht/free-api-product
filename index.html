<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Listing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Products API</p>
          <h1 id="page-title">Product Listing</h1>
          <p class="subtitle">
            Browse live product data from the FreeAPI random products endpoint.
          </p>
        </div>
        <button id="refreshButton" class="refresh-button" type="button">
          Refresh
        </button>
      </section>

      <section class="status-panel" id="statusPanel" aria-live="polite">
        Loading products...
      </section>

      <section class="summary" id="summary" hidden>
        <div>
          <span id="itemCount">0</span>
          <small>Products</small>
        </div>
        <div>
          <span id="categoryCount">0</span>
          <small>Categories</small>
        </div>
        <div>
          <span id="averageRating">0.0</span>
          <small>Average rating</small>
        </div>
      </section>

      <section
        class="product-grid"
        id="productGrid"
        aria-label="Product results"
      ></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
