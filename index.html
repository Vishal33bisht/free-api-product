<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Users UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Random Users API</p>
          <h1 id="page-title">User Profiles</h1>
          <p class="subtitle">
            Explore live user profiles from the FreeAPI random users endpoint.
          </p>
        </div>
        <button id="loadMoreButton" class="refresh-button" type="button">
          Load More Users
        </button>
      </section>

      <section class="status-panel" id="statusPanel" aria-live="polite">
        Loading users...
      </section>

      <section class="summary" id="summary" hidden>
        <div>
          <span id="userCount">0</span>
          <small>Users Loaded</small>
        </div>
        <div>
          <span id="nationalityCount">0</span>
          <small>Nationalities</small>
        </div>
        <div>
          <span id="genderCount">0</span>
          <small>Genders</small>
        </div>
      </section>

      <section
        class="user-grid"
        id="userGrid"
        aria-label="User profiles"
      ></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
